<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon" href="../favicon.ico" type="image/x-icon">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Videos | Logan Bashore</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: #e0e0e0;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            text-align: center;
        }

        .media-section {
            padding: 125px 0px 40px;
            text-align: center;
            flex: 1;
            min-height: 70vh;
            width: 90%;
            margin: 0 auto;
        }

        .media-section h2 {
            margin-bottom: 40px;
        }

        .media-tabs {
            margin-bottom: 40px;
            font-weight: 600;
            font-size: 1.6em;
            display: inline-flex;
            gap: 40px;
            justify-content: center;
        }

        .media-tabs .tab {
            color: #e0e0e0;
            text-decoration: none;
            padding-bottom: 5px;
            border-bottom: 3px solid transparent;
            cursor: pointer;
        }

        .media-tabs .tab:not(.active):hover {
            color: #B0BEC5;
        }

        .media-tabs .tab.active {
            border-color: #e0e0e0;
            font-weight: 700;
        }

        body.transitions-enabled .media-tabs .tab {
            transition: border-color .3s ease, color .3s ease;
        }

        .media-gallery {
            column-count: 3;
            column-gap: 20px;
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            margin-bottom: 30px;
            border-radius: 8px;
        }

        .video-wrapper iframe.youtube-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .youtube-link {
            display: flex;
            background-color: #1c1c1c;
            color: white;
            font-size: 1.1em;
            padding: 12px 25px;
            border-radius: 5px;
            text-decoration: none;
            margin-top: 30px;
            transition: background-color .3s ease;
            align-items: center;
            width: 560px;
            margin-left: auto;
            margin-right: auto;
        }

        .youtube-link img {
            width: 100px;
            height: 100px;
        }

        .youtube-link:hover {
            background-color: #a80000;
        }

        @media (max-width: 1024px) {
            .media-gallery {
                column-count: 2;
            }
        }

        @media (max-width: 1080px) {

            .media-gallery {
                column-count: 1;
            }

            .youtube-link {
                font-size: .9em;
                padding: 6px 15px;
                margin-top: 30px;
                width: 92%;
            }
        }
    </style>
</head>

<body>
    <div id="header-placeholder"></div>

    <section class="media-section">

        <h2 class="media-tabs">
            <a href="../photos" class="tab">Photos</a>
            <a href="../videos" class="tab active">Videos</a>
        </h2>

        <div class="media-gallery">

            <div class="video-wrapper">
                <iframe class="youtube-video" src="https://www.youtube.com/embed/6u-oGAfJnlc" allowfullscreen></iframe>
            </div>

            <div class="video-wrapper">
                <iframe class="youtube-video" src="https://www.youtube.com/embed/rC_oz0FYelM" allowfullscreen></iframe>
            </div>

            <div class="video-wrapper">
                <iframe class="youtube-video" src="https://www.youtube.com/embed/EHeLvlG5Ah8" allowfullscreen></iframe>
            </div>

        </div>

        <div class="media-gallery">

            <div class="video-wrapper">
                <iframe class="youtube-video" src="https://www.youtube.com/embed/47zHuP_VhdE" allowfullscreen></iframe>
            </div>

            <div class="video-wrapper">
                <iframe class="youtube-video" src="https://www.youtube.com/embed/bpnqhQ6Lv2g?start=61" allowfullscreen></iframe>
            </div>

            <div class="video-wrapper">
                <iframe class="youtube-video" src="https://www.youtube.com/embed/TuGRsBcu_rI" allowfullscreen></iframe>
            </div>

        </div>

        <a href="https://www.youtube.com/@loganbashore" class="youtube-link" target="_blank">
            <img src="../media/youtube.png">
            To see more of my videos, check out my YouTube channel!
        </a>

    </section>

    <div id="footer-placeholder"></div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            document.body.classList.add('transitions-enabled');
        });

        window.addEventListener('load', () => {
            setTimeout(() => {

                const images = document.querySelectorAll('.media-gallery img');

                images.forEach((img, index) => {
                    setTimeout(() => {
                        img.classList.add('fade-in');
                    }, index * 25);
                });

            }, 200);
        });
    </script>
    
    <script src="../js/site.js"></script>

    </body>
</html>
