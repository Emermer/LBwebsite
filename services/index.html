<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon" href="../favicon.ico" type="image/x-icon">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Services | Logan Bashore</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            background-color: #121212;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .nav-links {
            display: flex;
            gap: 20px;
        }

        .nav-links a {
            color: #e0e0e0;
            text-decoration: none;
            font-weight: 400;
            transition: color 0.3s;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: #ffffff;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            margin: 10px 0px 70px;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .main-content.fade-in {
            opacity: 1;
            transform: translateY(0);
        }

        .main-content-text {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .main-content-text.fade-in {
            opacity: 1;
            transform: translateY(0);
        }

        .main-content-text h1 {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            margin-top: 150px;
            font-size: 2.5em;
        }

        .nav-box {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #181818;
            border-radius: 20px;
            padding: 20px 0 0 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 65px;
            max-width: 350px;
            width: 100%;
            overflow: hidden;
        }

        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .nav-menu a {
            color: #e0e0e0;
            text-decoration: none;
            font-size: 1.4em;
            transition: color 0.3s;
        }

        .nav-menu a:hover {
            color: #B0BEC5;
        }

        .nav-image {
            width: 100%;
            height: auto;
            border-radius: 0 0 18px 18px;
            margin-top: 155px;
            display: block;
            pointer-events: none;
        }

        .social-links a {
            color: #e0e0e0;
            margin: 0 10px;
            font-size: 1.2em;
        }

        .email a {
            color: #e0e0e0;
            text-decoration: none;
        }

        @media (max-width: 1080px) {
            .nav-links {
                display: none;
                flex-direction: column;
                background-color: #121212;
                position: absolute;
                top: 70px;
                left: 0;
                right: 0;
                padding: 20px;
            }

            .main-content {
                margin: 18px 0px 36px;
            }

            .main-content-text h1 {
                margin-top: 4em;
                font-size: 2em;
            }

            .nav-box {
                max-width: 80%;
                gap: 0px;
            }

            .nav-menu a {
                font-size: 1.2em;
            }

            .nav-image {
                margin-top: 100px;
            }
        }
    </style>
</head>
    <header>
        <a href="/" class="logo">Logan Bashore</a>

        <div id="nav-placeholder"></div>

        <div class="hamburger">
            <i class="fas fa-bars"></i>
        </div>
    </header>

    <body>
        <div class="main-content-text">
            <h1>Store & Services</h1>
        </div>
        <div class="main-content">
            <div class="nav-box">
                <div class="nav-menu">
                    <a href="commissions">Commissions</a>
                    <a>Solos *COMING SOON*</a>
                    <a>Ensembles *COMING SOON*</a>
                </div>
                <img src="../media/percussionsheets.jpg" class="nav-image">
            </div>
        </div>

    <div id="footer-placeholder"></div>

    <script>
        window.addEventListener('load', () => {
            const mainText = document.querySelector('.main-content-text');
            mainText.classList.add('fade-in');
        
            const mainContent = document.querySelector('.main-content');
            const navImage = document.querySelector('.nav-image');
        
            if (navImage.complete) {
                setTimeout(() => mainContent.classList.add('fade-in'), 100);
            } else {
                navImage.addEventListener('load', () => {
                    setTimeout(() => mainContent.classList.add('fade-in'), 100);
                });
            }
        });
    </script>

    <script src="../js/site.js"></script>

    </body>
</html>
